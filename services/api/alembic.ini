# alembic.ini — NestAI API service
# Documentation: https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to the alembic versions directory (relative to this file)
script_location = alembic

# Template string for new revision filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with this directory so `app` package is importable
prepend_sys_path = .

# Read DATABASE_URL from the environment (set via .env or shell)
# The env.py script overrides this value at runtime.
sqlalchemy.url = postgresql://placeholder/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
