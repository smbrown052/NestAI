# docker-compose.yml — NestAI local development
#
# Starts a local PostgreSQL database.
# All other services (FastAPI, Streamlit) run directly on your machine.
#
# Usage:
#   docker compose up -d db          # start the database
#   docker compose down               # stop everything
#   docker compose down -v            # stop and delete all data (destructive!)
#
# The database password comes from the .env file — never commit a real password.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: nestai
      POSTGRES_USER: nestai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nestai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
